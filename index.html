<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIFTY Options Portfolio Dashboard</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div id="niftyDashboard">
        <main class="page">
            <section class="main-header hero">
                <h1 class="main-title">NIFTY Options Portfolio Dashboard 2026</h1>
                <div class="main-subtitle">Year 2026</div>
            </section>

            <section class="mobile-tabs" id="mobileTabs">
                <button class="mobile-tab-btn active" onclick="switchMobileTab('snapshot', this)">Snapshot</button>
                <button class="mobile-tab-btn" onclick="switchMobileTab('chart', this)"> Chart</button>
                <button class="mobile-tab-btn" onclick="switchMobileTab('payoff', this)">Table</button>
            </section>

            <section class="dashboard-content layout">
            <aside class="left-panel panel snapshot-panel">
                <div class="panel-header">
                    <div>
                        <h2 class="panel-title">Position Snapshot</h2>
                    </div>
                    <div id="statusIndicator" class="status loading">Loading data...</div>
                </div>
                <div id="totalProfit" class="profit-line loading">Loading...</div>
                <div class="snapshot-cards positions" id="snapshotCards">
                    <div class="loading">
                        <div class="spinner"></div>
                        <div>Loading...</div>
                    </div>
                </div>
            </aside>

            <section class="right-panel panel workspace-panel">
                <section class="desktop-tabs tabs">
                    <button class="tab-btn active" onclick="switchTab('chart', this)"> Chart</button>
                    <button class="tab-btn" onclick="switchTab('payoff', this)"> Table</button>
                </section>

                <div id="tabChart" class="tab-content active desktop-tab-panel" data-panel="chart">
                    <div class="panel-header chart-panel-header">
                        <div>
                            <h2 class="panel-title">Portfolio Trend</h2>
                        </div>
                        <div class="legend">
                            <span><i class="legend-pl"></i>Portfolio P&amp;L</span>
                            <span><i class="legend-spot"></i>NIFTY Close</span>
                        </div>
                    </div>
                    <div class="chart-wrapper chart-shell" id="chartContainer">
                        <div class="loading">
                            <div class="spinner"></div>
                            <div>Loading chart...</div>
                        </div>
                    </div>
                </div>

                <div id="tabPayoff" class="tab-content desktop-tab-panel" data-panel="table">
                    <div class="panel-header">
                        <div>
                            <h2 class="panel-title">Daily Payoff Table</h2>
                        </div>
                        <div id="rowCount" class="status"></div>
                    </div>
                    <div class="panel-content table-wrap">
                        <table id="payoffTable">
                            <thead>
                                <tr>
                                    <th>Date</th>
                                    <th>NIFTY Close</th>
                                    <th>Put</th>
                                    <th>Call</th>
                                    <th>P&amp;L</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td colspan="5" class="loading">
                                        <div class="spinner"></div>
                                        <div>Loading...</div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>
            </section>
        </main>
    </div> <!-- End niftyDashboard -->
    <script src="./config.js"></script>
    <script src="./main.js"></script>
</body>
</html>
