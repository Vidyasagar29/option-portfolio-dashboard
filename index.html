<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIFTY Options Portfolio Dashboard</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div id="niftyDashboard">
        <div class="dashboard">
            <!-- Main Header -->
            <div class="main-header">
                <h1 class="main-title">NIFTY Options Portfolio Dashboard 2026</h1>
                <div class="main-subtitle">Year 2026</div>
            </div>

            <!-- Mobile Tabs -->
            <div class="mobile-tabs">
                <button class="mobile-tab-btn active" onclick="switchMobileTab('snapshot')">Snapshot</button>
                <button class="mobile-tab-btn" onclick="switchMobileTab('chart')"> Chart</button>
                <button class="mobile-tab-btn" onclick="switchMobileTab('payoff')">Table</button>
            </div>

            <div class="dashboard-content">
            <!-- Left Panel: Portfolio Snapshot -->
            <div class="left-panel">
                <div class="panel-header">Position Snapshot</div>
                <div id="statusIndicator" class="status-indicator loading">Loading data...</div>
                <div class="snapshot-cards" id="snapshotCards">
                    <div class="loading">
                        <div class="spinner"></div>
                        <div>Loading...</div>
                    </div>
                </div>
            </div>

            <!-- Right Panel: Tabs (Chart & Payoff Table) -->
            <div class="right-panel">
                <!-- Desktop Tabs -->
                <div class="desktop-tabs">
                    <button class="tab-btn active" onclick="switchTab('chart')"> Chart</button>
                    <button class="tab-btn" onclick="switchTab('payoff')"> Table</button>
                </div>

                <!-- Tab Content: Chart -->
                <div id="tabChart" class="tab-content active">
                    <div class="chart-wrapper" id="chartContainer">
                        <div class="loading">
                            <div class="spinner"></div>
                            <div>Loading chart...</div>
                        </div>
                    </div>
                </div>

                <!-- Tab Content: Payoff Table -->
                <div id="tabPayoff" class="tab-content">
                    <div class="panel-content">
                        <table id="payoffTable">
                            <thead>
                                <tr>
                                    <th>Date</th>
                                    <th>NIFTY Close</th>
                                    <th>Put</th>
                                    <th>Call</th>
                                    <th>P&amp;L</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td colspan="5" class="loading">
                                        <div class="spinner"></div>
                                        <div>Loading...</div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
            </div> <!-- End dashboard-content -->
        </div> <!-- End dashboard -->
    </div> <!-- End niftyDashboard -->
    <script src="./config.js"></script>
    <script src="./main.js"></script>
</body>
</html>
